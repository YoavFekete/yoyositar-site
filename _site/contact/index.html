<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toggle = document.querySelector(".nav-toggle");
    const nav = document.querySelector("#site-nav");
    const dropdown = document.querySelector(".nav-dropdown");
    const dropdownButton = dropdown ? dropdown.querySelector(".nav-parent") : null;
    const audioPlayers = document.querySelectorAll("[data-audio-player]");

    if (toggle && nav) {
      toggle.addEventListener("click", function () {
        const isOpen = nav.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        toggle.setAttribute("aria-label", isOpen ? "Close menu" : "Open menu");
      });
    }

    if (!dropdown || !dropdownButton) return;

    const closeDropdown = function () {
      dropdown.classList.remove("is-open");
      dropdownButton.setAttribute("aria-expanded", "false");
    };

    const openDropdown = function () {
      dropdown.classList.add("is-open");
      dropdownButton.setAttribute("aria-expanded", "true");
    };

    dropdownButton.addEventListener("click", function (event) {
      const isDesktopStaticMenu = window.matchMedia("(max-width: 900px)").matches || document.body.classList.contains("home");
      if (isDesktopStaticMenu) return;

      event.preventDefault();
      const isOpen = dropdown.classList.contains("is-open");
      if (isOpen) {
        closeDropdown();
      } else {
        openDropdown();
      }
    });

    document.addEventListener("click", function (event) {
      if (!dropdown.contains(event.target)) {
        closeDropdown();
      }
    });

    dropdown.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeDropdown();
        dropdownButton.focus();
      }
    });

    audioPlayers.forEach(function (player) {
      const button = player.querySelector(".hero-audio-toggle");
      const label = player.querySelector(".hero-audio-label");
      const audio = player.querySelector(".hero-audio-element");

      if (!button || !label || !audio) return;

      const setPlayingState = function (isPlaying) {
        player.classList.toggle("is-playing", isPlaying);
        button.setAttribute("aria-pressed", isPlaying ? "true" : "false");
        button.setAttribute("aria-label", isPlaying ? "Pause featured intro" : "Play featured intro");
        label.textContent = isPlaying ? "Pause" : "Listen";
      };

      button.addEventListener("click", function () {
        if (audio.paused) {
          audioPlayers.forEach(function (otherPlayer) {
            if (otherPlayer === player) return;

            const otherAudio = otherPlayer.querySelector(".hero-audio-element");
            const otherButton = otherPlayer.querySelector(".hero-audio-toggle");
            const otherLabel = otherPlayer.querySelector(".hero-audio-label");

            if (otherAudio) otherAudio.pause();
            otherPlayer.classList.remove("is-playing");
            if (otherButton) {
              otherButton.setAttribute("aria-pressed", "false");
              otherButton.setAttribute("aria-label", "Play featured intro");
            }
            if (otherLabel) otherLabel.textContent = "Listen";
          });

          audio.play();
          setPlayingState(true);
        } else {
          audio.pause();
          setPlayingState(false);
        }
      });

      audio.addEventListener("ended", function () {
        audio.currentTime = 0;
        setPlayingState(false);
      });

      audio.addEventListener("pause", function () {
        if (!audio.ended) {
          setPlayingState(false);
        }
      });
    });
  });
</script>
